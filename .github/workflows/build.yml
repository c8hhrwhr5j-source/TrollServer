name: TrollServer iPad Spoof dylib + TrollFools CI Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install ldid (entitlements signer)
        run: |
          if command -v ldid &> /dev/null; then
            echo "ldid already installed"
          else
            echo "ldid not found, attempting install via Homebrew..."
            brew install ldid || echo "⚠️ brew install ldid failed (may not be available in Homebrew)"
            if command -v ldid &> /dev/null; then
              echo "ldid installed successfully"
            else
              echo "⚠️ ldid not available, entitlements will need manual injection via TrollStore"
            fi
          fi
          true
      - name: Build libiPadSpoof.dylib + test dylibs
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          if [ -d "spoof" ]; then
            cd spoof
          else
            echo "ERROR: spoof directory not found"
            exit 1
          fi
          chmod +x build_spoof.sh build_testboot.sh build_purec.sh
          echo "=== 编译 libiPadSpoof ==="
          ./build_spoof.sh
          echo "=== 编译测试探针 ==="
          ./build_testboot.sh
          echo "=== 编译纯C探针 ==="
          ./build_purec.sh
          echo "=== 所有产物 ==="
          ls -la *.dylib

      - name: Build Release IPA
        run: |
          ls -la
          if [ -f "build.sh" ]; then
            chmod +x build.sh
            ./build.sh
            if [ -f "build/TrollServer.ipa" ]; then
              cp "build/TrollServer.ipa" "TrollServer.ipa"
            fi
          elif [ -d "TrollServer.xcodeproj" ]; then
            xcodebuild -project TrollServer.xcodeproj -scheme TrollServer -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
            mkdir -p Payload
            cp -r build/Release-iphoneos/TrollServer.app Payload/
            zip -r TrollServer.ipa Payload
          else
            echo "WARNING: No build.sh or xcodeproj found, creating minimal IPA"
            mkdir -p Payload/TrollServer.app
            cp spoof/libiPadSpoof.dylib Payload/TrollServer.app/; true
            cp 123.png Payload/TrollServer.app/Icon.png; true
            zip -r TrollServer.ipa Payload
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TrollServer-artifacts
          path: |
            TrollServer.ipa
            spoof/*.dylib

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrollServer Build #${{ github.run_number }}"
          body: |
            Auto build artifacts:
            - TrollServer.ipa (TrollStore install package)
            - libiPadSpoof.dylib (主伪装 dylib)
            - libTestBoot.dylib (Foundation 探针)
            - libPureC_arm64.dylib (纯C arm64 探针)
            - libPureC_arm64e.dylib (纯C arm64e 探针)
          files: |
            TrollServer.ipa
            spoof/*.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
